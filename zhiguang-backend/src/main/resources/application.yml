server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    context-path: /

spring:
  application:
    name: zhiguang-backend

  datasource:
    url: jdbc:mysql://localhost:3306/zhiguang?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ZhiguangPlatformSecretKey2024ThisIsAVeryLongSecretKeyForJWTTokenGeneration
  expiration: 86400000

logging:
  level:
    root: INFO
    com.zhiguang: DEBUG

ai:
  provider: deepseek
  api-key: sk-e895abd54a384736ad5be8e0d08746be
  model: deepseek-chat
  base-url: https://api.deepseek.com/v1
  max-content-length: 10000
  timeout-seconds: 60